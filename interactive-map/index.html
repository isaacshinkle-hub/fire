const missingAirports = ["KKJC"] || [];
const title = "Interactive Aircraft Map - 2026-06-14_to_2026-06-14";
const sourceName = "2026 NASDD Daily Summary 2026-06-14_to_2026-06-14.xlsx";
const generatedAt = "2026-06-15 08:55";

const map = L.map('map', { preferCanvas:true }).setView([39.5, -98.5], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 12,
  attribution: '&copy; OpenStreetMap contributors | GACC boundaries: NIFC Open Data | Airports: OurAirports'
}).addTo(map);

const colors = { atgs:'#2563eb', lead:'#f97316' };
const markerById = new Map();
const aircraftMarkerRows = [];

function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toggleFilters() {
  const box = document.getElementById('filter-control');
  const btn = document.getElementById('filter-toggle');
  const collapsed = box.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Filters +' : 'Filters -';
}
function fmt(n) { return Number(n || 0).toLocaleString(undefined, { maximumFractionDigits: 2 }); }
function pct(n) { return fmt(n) + '%'; }
function typeChip(r) { return `<span class="chip ${r.typeKey}">${r.typeKey === 'lead' ? 'Lead/ASM' : 'ATGS/HLCO'}</span>`; }
function zeroChip(r) { return r.zeroFlight ? '<span class="chip zero">zero flight</span>' : ''; }

const gaccLayer = L.geoJSON(gaccGeoJson, {
  style: f => ({ color:'#334155', weight:1.5, opacity:.9, fillColor:'#94a3b8', fillOpacity:.06 }),
  onEachFeature: (feature, layer) => {
    const shortName = feature.properties.ShortName || feature.properties.GACCName;
    layer.on('click', () => selectGacc(shortName));
    layer.bindTooltip(shortName, { sticky:true });
  }
}).addTo(map);

for (const r of records) {
  if (!r.hasCoords) continue;
  const cls = `aircraft-icon ${r.typeKey} ${r.zeroFlight ? 'zero' : ''}`;
  const marker = L.marker([r.plotLat, r.plotLon], {
    icon: L.divIcon({ className:'', html:`<div class="${cls}"></div>`, iconSize:[22,22], iconAnchor:[11,11] }),
    title: `${r.callSign || 'N/A'} ${r.tail || ''} ${r.base || ''}`
  });
  marker.on('click', () => selectAircraft(r));
  marker.bindTooltip(`${esc(r.callSign || 'N/A')} | ${esc(r.tail)} | ${esc(r.base)} | ${esc(r.agencyLabel || 'BLM+')} | ${fmt(r.flightHours)} hrs`, { sticky:true });
  marker.addTo(map);
  aircraftMarkerRows.push({ r, marker });
  markerById.set(r.id, marker);
}

function updateLayerVisibility() {
  const showType = {
    atgs: document.getElementById('toggle-atgs').checked,
    lead: document.getElementById('toggle-lead').checked
  };
  const showAgency = {
    usfs: document.getElementById('toggle-usfs').checked,
    state: document.getElementById('toggle-state').checked,
    blmplus: document.getElementById('toggle-blmplus').checked
  };
  for (const row of aircraftMarkerRows) {
    const r = row.r;
    const visible = !!showType[r.typeKey] && !!showAgency[r.agencyGroup || 'blmplus'];
    if (visible && !map.hasLayer(row.marker)) row.marker.addTo(map);
    if (!visible && map.hasLayer(row.marker)) map.removeLayer(row.marker);
  }
}
for (const id of ['toggle-atgs','toggle-lead','toggle-usfs','toggle-state','toggle-blmplus']) {
  document.getElementById(id).addEventListener('change', updateLayerVisibility);
}

function fitAircraft() {
  const pts = records.filter(r => r.hasCoords).map(r => [r.plotLat, r.plotLon]);
  if (pts.length) map.fitBounds(pts, { padding:[40,40], maxZoom:6 });
}

function showOverview() {
  const total = records.length;
  const atgs = records.filter(r => r.typeKey === 'atgs');
  const lead = records.filter(r => r.typeKey === 'lead');
  document.getElementById('panel').innerHTML = `
    <h1>${esc(title)}</h1>
    <div class="muted">Source: ${sourceName}<br>Generated: ${generatedAt}</div>
    <div class="stat-grid">
      <div class="stat"><div class="label">Aircraft</div><div class="value">${total}</div></div>
      <div class="stat"><div class="label">ATGS/HLCO</div><div class="value">${atgs.length}</div></div>
      <div class="stat"><div class="label">Lead/ASM</div><div class="value">${lead.length}</div></div>
    </div>
    <h2>How to use</h2>
    <p>Click a colored aircraft dot for details. Hover over a GACC boundary for its name, or click the boundary for its aircraft list and flight percentage. Blue = ATGS/HLCO. Orange = Lead/ASM. Use the Agency Managing Contract checkboxes to filter USFS, State, and BLM+ aircraft. Zero-flight aircraft stay visible without an X; zero-flight status remains in the detail card.</p>
    ${missingAirports.length ? `<div class="missing"><strong>Unplotted airport IDs:</strong> ${missingAirports.map(esc).join(', ')}</div>` : ''}
  `;
}

function incidentText(r) { const names = Array.isArray(r.incidentNames) ? r.incidentNames.filter(Boolean) : []; return names.length ? names.map(esc).join('<br>') : 'Not reported'; }
function optionalText(v) { return v ? esc(v) : 'Not reported'; }

function selectAircraft(r) {
  document.getElementById('panel').innerHTML = `
    <h1>${typeChip(r)} ${zeroChip(r)}<br>${esc(r.callSign || 'N/A')}</h1>
    <div class="muted">${esc(r.assignedGacc)} | ${esc(r.base)} ${r.offsetNote ? '| plotted with small offset' : ''}</div>
    <table class="detail">
      <tr><th>Tail number</th><td>${esc(r.tail)}</td></tr>
      <tr><th>Airport</th><td>${esc(r.base)} - ${esc(r.airportName)}<br><span class="muted">${esc(r.airportMunicipality)} ${esc(r.airportRegion)}</span></td></tr>
      <tr><th>Flight hours</th><td>${fmt(r.flightHours)} ${r.zeroFlight ? '(zero flight)' : ''}</td></tr>
      <tr><th>Assigned GACC</th><td>${esc(r.assignedGacc)}</td></tr>
      <tr><th>Supervisor</th><td>${esc(r.supervisor)}</td></tr>
      <tr><th>Pilot</th><td>${esc(r.pilot)}</td></tr>
      <tr><th>Trainee</th><td>${esc(r.trainee)}</td></tr>
      <tr><th>Agency Managing Contract</th><td>${esc(r.agency || r.agencyLabel || 'BLM+')}</td></tr>
      <tr><th>Mission flown?</th><td>${esc(r.didFlyMission)}</td></tr>
      <tr><th>Incident name(s)</th><td>${incidentText(r)}</td></tr>
      <tr><th>LWD</th><td>${optionalText(r.lwd)}</td></tr>
      <tr><th>Hours remaining until next scheduled maintenance</th><td>${optionalText(r.maintenanceHoursRemaining)}</td></tr>
      <tr><th>Comments &amp; Notes</th><td>${optionalText(r.commentsNotes)}</td></tr>
    </table>
    <button class="btn" onclick="selectGacc('${esc(String(r.assignedGacc)).replace(/'/g, '\\&#39;')}')">Open ${esc(r.assignedGacc)} GACC</button>
  `;
}

function selectGacc(name) {
  const s = gaccSummaries[name];
  if (!s) {
    document.getElementById('panel').innerHTML = `<h1>${esc(name)}</h1><p>No assigned aircraft from today's report.</p>`;
    return;
  }
  const rows = (s.aircraft || []).map(a => `
    <div class="aircraft-row" onclick="selectAircraftById('${esc(a.id)}')">
      ${typeChip(a)} ${a.zeroFlight ? '<span class="chip zero">zero</span>' : ''}<br>
      <strong>${esc(a.callSign || 'N/A')}</strong> â€” ${esc(a.tail)}<br>
      <span class="muted">${esc(a.base)} â€” ${esc(a.airportName)} | ${fmt(a.flightHours)} hrs</span>
    </div>`).join('');
  document.getElementById('panel').innerHTML = `
    <h1>${esc(s.name)}</h1>
    <div class="muted">${esc(s.boundaryName)}</div>
    <div class="stat-grid">
      <div class="stat"><div class="label">Aerial supervision aircraft</div><div class="value">${s.aircraftCount}</div></div>
      <div class="stat"><div class="label">Aerial supervision percent flown</div><div class="value">${pct(s.percentFlown)}</div></div>
      <div class="stat"><div class="label">Aerial supervision total hours</div><div class="value">${fmt(s.totalHours)}</div></div>
      <div class="stat"><div class="label">Aerial supervision zero flight</div><div class="value">${s.zeroCount}</div></div>
      <div class="stat"><div class="label">ATGS/HLCO</div><div class="value">${s.atgsCount}<br><span class="muted">${fmt(s.atgsHours)} hrs</span></div></div>
      <div class="stat"><div class="label">Lead/ASM</div><div class="value">${s.leadCount}<br><span class="muted">${fmt(s.leadHours)} hrs</span></div></div>
    </div>
    <h2>Assigned aircraft</h2>
    <div class="aircraft-list">${rows || '<p>No aircraft listed.</p>'}</div>
  `;
}

function selectAircraftById(id) {
  const r = records.find(x => String(x.id) === String(id));
  if (!r) return;
  if (r.hasCoords) {
    map.setView([r.plotLat, r.plotLon], Math.max(map.getZoom(), 6));
    const m = markerById.get(r.id);
    if (m) m.openTooltip();
  }
  selectAircraft(r);
}

const supplementalMarkerRows = [];
const supplementalStatusDate = '2026-06-15';
const supplementalWorkbookName = 'aircraft_status_workbook.xlsx';
const supplementalColors = { lpilSupplement:'#f97316', airtanker:'#dc2626', scooper:'#0891b2', airtankerBase:'#7c3aed' };
const supplementalClass = { lpilSupplement:'supp-lpil', airtanker:'airtanker', scooper:'scooper', airtankerBase:'airtankerBase' };
const supplementalLabel = { lpilSupplement:'Supplemental Lead/ASM', airtanker:'Air Tanker', scooper:'Scooper', airtankerBase:'Air Tanker Base' };
function supplementalGlyph(r) { if (r.layerKey === 'airtankerBase') return 'B'; if (r.layerKey === 'scooper') return 'S'; if (r.layerKey === 'airtanker') return 'T'; return ''; }
function detailRows(details) { return Object.entries(details || {}).filter(([k,v]) => String(v ?? '').trim() !== '').map(([k,v]) => '<tr><th>' + esc(k) + '</th><td>' + esc(v) + '</td></tr>').join(''); }
function selectSupplementalResource(r) {
  document.getElementById('panel').innerHTML =
    '<h1><span class="chip" style="background:' + (supplementalColors[r.layerKey] || '#334155') + '">' + esc(supplementalLabel[r.layerKey] || r.layerLabel) + '</span><br>' + esc(r.name || r.airportId || 'Status resource') + '</h1>' +
    '<div class="status-note"><strong>Aircraft status workbook layer.</strong> Added from ' + esc(supplementalWorkbookName) + ' for current-day status date ' + esc(supplementalStatusDate) + '. This supplemental source is still being refined.</div>' +
    '<div class="muted">' + esc(r.assignedGacc || '') + ' | ' + esc(r.airportId || r.location || '') + ' ' + (r.offsetNote ? '| plotted with small offset' : '') + '</div>' +
    '<table class="detail">' +
      '<tr><th>Layer</th><td>' + esc(r.layerLabel) + '</td></tr>' +
      '<tr><th>Status</th><td>' + esc(r.status) + '</td></tr>' +
      '<tr><th>Assigned GACC</th><td>' + esc(r.assignedGacc) + ' (' + esc(r.gaccCode) + ')</td></tr>' +
      '<tr><th>Airport</th><td>' + esc(r.airportId) + ' â€” ' + esc(r.airportName) + '<br><span class="muted">' + esc(r.airportMunicipality) + ' ' + esc(r.airportRegion) + '</span></td></tr>' +
      '<tr><th>Source</th><td>' + esc(r.sourceSheet) + ' row ' + esc(r.sourceRow) + '</td></tr>' + detailRows(r.details) + '</table>';
}
for (const r of supplementalStatusRecords) {
  if (!r.hasCoords) continue;
  const cls = 'aircraft-icon ' + (supplementalClass[r.layerKey] || '');
  const marker = L.marker([r.plotLat, r.plotLon], { icon: L.divIcon({ className:'', html:'<div class="' + cls + '">' + supplementalGlyph(r) + '</div>', iconSize:[22,22], iconAnchor:[11,11] }), title: (r.layerLabel || '') + ' ' + (r.name || '') + ' ' + (r.airportId || '') });
  marker.on('click', () => selectSupplementalResource(r));
  marker.bindTooltip(esc(r.layerLabel) + ' | ' + esc(r.name) + ' | ' + esc(r.airportId) + ' | ' + esc(r.assignedGacc) + ' | ' + esc(r.status), { sticky:true });
  marker.addTo(map);

const __originalUpdateLayerVisibility = updateLayerVisibility;
updateLayerVisibility = function() {
  __originalUpdateLayerVisibility();
  const showSupplemental = { lpilSupplement: document.getElementById('toggle-lead')?.checked, airtanker: document.getElementById('toggle-airtanker')?.checked, scooper: document.getElementById('toggle-scooper')?.checked, airtankerBase: document.getElementById('toggle-airtankerBase')?.checked };
  for (const row of supplementalMarkerRows) { const visible = !!showSupplemental[row.r.layerKey]; if (visible && !map.hasLayer(row.marker)) row.marker.addTo(map); if (!visible && map.hasLayer(row.marker)) map.removeLayer(row.marker); }
};
for (const id of ['toggle-airtanker','toggle-scooper','toggle-airtankerBase']) { document.getElementById(id)?.addEventListener('change', updateLayerVisibility); }
fitAircraft = function() { const pts = records.filter(r => r.hasCoords).map(r => [r.plotLat, r.plotLon]); for (const row of supplementalMarkerRows) pts.push([row.r.plotLat, row.r.plotLon]); if (pts.length) map.fitBounds(pts, { padding:[40,40], maxZoom:6 }); };
const __originalShowOverview = showOverview;
showOverview = function() {
  __originalShowOverview();
  const counts = supplementalStatusRecords.reduce((a,r)=>{ a[r.layerKey]=(a[r.layerKey]||0)+1; return a; }, {});
  const panel = document.getElementById('panel');
  const statGrid = panel.querySelector('.stat-grid');
  if (statGrid) {
    // Update total aircraft count to include supplemental aircraft (not bases)
    const aircraftStat = statGrid.querySelector('.stat .label');
    if (aircraftStat && aircraftStat.textContent === 'Aircraft') {
      const totalAircraft = records.length + (counts.airtanker || 0) + (counts.scooper || 0) + (counts.lpilSupplement || 0);
      const valueDiv = aircraftStat.parentElement.querySelector('.value');
      if (valueDiv) valueDiv.textContent = totalAircraft;
    }
    const tankerCount = counts.airtanker || 0;
    const scooperCount = counts.scooper || 0;
    const baseCount = counts.airtankerBase || 0;
    if (tankerCount > 0) {
      const tankerStat = document.createElement('div');
      tankerStat.className = 'stat';
      tankerStat.innerHTML = '<div class="label">Air tankers</div><div class="value">' + tankerCount + '</div>';
      statGrid.appendChild(tankerStat);
    }
    if (scooperCount > 0) {
      const scooperStat = document.createElement('div');
      scooperStat.className = 'stat';
      scooperStat.innerHTML = '<div class="label">Scoopers</div><div class="value">' + scooperCount + '</div>';
      statGrid.appendChild(scooperStat);
    }
    if (baseCount > 0) {
      const baseStat = document.createElement('div');
      baseStat.className = 'stat';
      baseStat.innerHTML = '<div class="label">Tanker bases</div><div class="value">' + baseCount + '</div>';
      statGrid.appendChild(baseStat);
    }
  }
  const note = document.createElement('div'); note.className = 'status-note';
  note.innerHTML = '<strong>Aircraft status workbook layers added:</strong><br>' + 'Supplemental Lead/ASM: ' + (counts.lpilSupplement||0) + ' | Air Tankers: ' + (counts.airtanker||0) + ' | Scoopers: ' + (counts.scooper||0) + ' | Air Tanker Bases: ' + (counts.airtankerBase||0) + '<br>' + 'NASDD remains authoritative for prior-day Lead/ASM and ATGS/HLCO; this workbook is current-day supplemental status data.';
  panel.prepend(note);
};
function supplementalForGacc(name, layerKey) { const want = String(name || '').trim().toUpperCase(); return supplementalStatusRecords.filter(r => r.layerKey === layerKey && String(r.assignedGacc || '').trim().toUpperCase() === want).sort((a,b) => String(a.name || a.airportId || '').localeCompare(String(b.name || b.airportId || ''))); }
function baseAircraftRow(a) { return '<div class="aircraft-row" onclick="selectAircraftById(\'' + esc(a.id) + '\')">' + typeChip(a) + (a.zeroFlight ? ' <span class="chip zero">zero</span>' : '') + '<br><strong>' + esc(a.callSign || 'N/A') + '</strong> â€” ' + esc(a.tail || '') + '<br><span class="muted">' + esc(a.base || '') + ' â€” ' + esc(a.airportName || '') + ' | ' + fmt(a.flightHours) + ' hrs</span></div>'; }
function supplementalResourceRow(r) { const color = supplementalColors[r.layerKey] || '#334155'; const label = supplementalLabel[r.layerKey] || r.layerLabel || 'Status'; return '<div class="aircraft-row" onclick="selectSupplementalResourceById(\'' + esc(r.id) + '\')"><span class="chip" style="background:' + color + '">' + esc(label) + '</span> <span class="chip zero">' + esc(r.status || '') + '</span><br><strong>' + esc(r.name || r.airportId || 'N/A') + '</strong>' + (r.layerKey === 'airtankerBase' ? '' : ' â€” ' + esc((r.details && (r.details['Tanker #'] || r.details['AC N#'])) || '')) + '<br><span class="muted">' + esc(r.airportId || r.location || '') + ' â€” ' + esc(r.airportName || '') + '</span></div>'; }
function renderGaccSection(title, rows) { if (!rows || !rows.length) return ''; return '<h2>' + esc(title) + '</h2><div class="aircraft-list">' + rows.join('') + '</div>'; }
function selectSupplementalResourceById(id) { const r = supplementalStatusRecords.find(x => String(x.id) === String(id)); if (!r) return; if (r.hasCoords) map.setView([r.plotLat, r.plotLon], Math.max(map.getZoom(), 6)); selectSupplementalResource(r); }
selectGacc = function(name) {
  const s = gaccSummaries[name];
  const baseItems = s ? (s.aircraft || []) : [];
  const leadRows = baseItems.filter(a => a.typeKey === 'lead').map(baseAircraftRow).concat(supplementalForGacc(name, 'lpilSupplement').map(supplementalResourceRow));
  const atgsRows = baseItems.filter(a => a.typeKey !== 'lead').map(baseAircraftRow);
  const tankerRows = supplementalForGacc(name, 'airtanker').map(supplementalResourceRow);
  const scooperRows = supplementalForGacc(name, 'scooper').map(supplementalResourceRow);
  const baseRows = supplementalForGacc(name, 'airtankerBase').map(supplementalResourceRow);
  const sections = [renderGaccSection('Lead/ASM', leadRows), renderGaccSection('Air Attack / ATGS-HLCO', atgsRows), renderGaccSection('Air Tankers', tankerRows), renderGaccSection('Scoopers', scooperRows), renderGaccSection('Open Air Tanker Bases', baseRows)].join('');
  if (!s) { document.getElementById('panel').innerHTML = '<h1>' + esc(name) + '</h1>' + (sections || '<p>No assigned aircraft or supplemental status resources from this map.</p>'); return; }
  const gaccTankerCount = tankerRows.length;
  const gaccScooperCount = scooperRows.length;
  const gaccBaseCount = baseRows.length;
  const totalGaccAircraft = s.aircraftCount + gaccTankerCount + gaccScooperCount + (leadRows.length - s.leadCount);
  document.getElementById('panel').innerHTML = '<h1>' + esc(s.name) + '</h1><div class="muted">' + esc(s.boundaryName) + '</div><div class="status-note"><strong>GACC list:</strong> Lead/ASM combines NASDD reported aircraft with non-duplicate available/traveling LPIL status aircraft. Air tankers, scoopers, and open bases are current-day status layers.</div>' +
    '<div class="stat-grid"><div class="stat"><div class="label">Total aircraft</div><div class="value">' + totalGaccAircraft + '</div></div><div class="stat"><div class="label">Aerial supervision zero flight</div><div class="value">' + s.zeroCount + '</div></div><div class="stat"><div class="label">ATGS/HLCO</div><div class="value">' + s.atgsCount + '</div></div><div class="stat"><div class="label">Lead/ASM</div><div class="value">' + leadRows.length + '</div></div>' + (gaccTankerCount > 0 ? '<div class="stat"><div class="label">Air tankers</div><div class="value">' + gaccTankerCount + '</div></div>' : '') + (gaccScooperCount > 0 ? '<div class="stat"><div class="label">Scoopers</div><div class="value">' + gaccScooperCount + '</div></div>' : '') + (gaccBaseCount > 0 ? '<div class="stat"><div class="label">Tanker bases</div><div class="value">' + gaccBaseCount + '</div></div>' : '') + '</div>' + (sections || '<p>No assigned aircraft or supplemental status resources listed.</p>');
};

showOverview();
setTimeout(fitAircraft, 250);
</script>
