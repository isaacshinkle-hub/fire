<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Summary</title><style>
:root{--bg:#0f1519;--card:#1b252c;--text:#f6f4ee;--muted:#b7b0a1;--accent:#e07b39;--line:#35434d}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#0f1519,#1a211c);color:var(--text);line-height:1.55}.wrap{max-width:900px;margin:0 auto;padding:48px 22px}.hero{padding:34px;border:1px solid var(--line);border-radius:18px;background:rgba(27,37,44,.94);box-shadow:0 12px 35px rgba(0,0,0,.25)}h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3.4rem)}h2{margin:0 0 8px}.sub{color:var(--muted);font-size:1.08rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:28px}.card{display:block;padding:22px;border:1px solid var(--line);border-radius:16px;background:var(--card);color:var(--text);text-decoration:none}.card:hover{border-color:var(--accent);transform:translateY(-1px)}.card p{color:var(--muted);margin:8px 0 0}.links{margin-top:24px}.links a{color:#ffd199}.footer{margin-top:36px;color:var(--muted);font-size:.9rem}.button{display:inline-block;margin-top:16px;padding:12px 16px;border-radius:10px;background:var(--accent);color:#1b120c;text-decoration:none;font-weight:bold}
</style></head><body><main class="wrap"><section class="hero"><h1>Weekly Summary</h1><p class="sub">Latest weekly briefing PDF.</p><a class="button" href="latest.pdf">Open Latest Weekly Summary PDF</a><p class="links"><a href="../">Fire Resources</a></p></section></main></body></html>
